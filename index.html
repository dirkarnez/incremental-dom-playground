<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./incremental-dom-min.js"></script>
</head>

<body>
    <a href="https://github.com/dirkarnez/incremental-dom-playground" target="_blank">dirkarnez/incremental-dom-playground</a><br>
    <div id="container"></div>
    <script>
        const elementOpen = IncrementalDOM.elementOpen;
        const elementClose = IncrementalDOM.elementClose;
        const elementVoid = IncrementalDOM.elementVoid;
        const text = IncrementalDOM.text;
        const patch = IncrementalDOM.patch;

        function render(data) {
            elementVoid('input', '', [ 'type', 'text' ]);
            elementOpen('div', '', null);
            if (data.someCondition) {
                text(data.text);
            }
            elementClose('div');
        }

        const container = document.getElementById("container");

        var data = {
            text: 'Hello World!',
            someCondition: true
        };

        patch(container, function() {
            render(data);
        });

        setInterval(() => {
            data.text += '!';

            patch(container, function() {
                render(data);
            });
            
        }, 500);
    </script>
